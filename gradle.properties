kotlin.code.style=official

# Three KSP processors now run in one compilation (micronaut-inject, serde, validation) on top of
# jOOQ codegen, which exhausts the default daemon metaspace. Give the daemon room so the build
# doesn't intermittently fail with `OutOfMemoryError: Metaspace` during `kspKotlin`/`kspTestKotlin`.
org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m
