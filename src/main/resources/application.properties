# Serve the compile-time generated OpenAPI document and Swagger UI as static resources. The
# micronaut-openapi processor writes the spec under META-INF/swagger and the UI under
# META-INF/swagger/views/swagger-ui; these mappings expose them at /swagger/** and /swagger-ui/**.
# (Properties, not YAML, to avoid pulling in a YAML config dependency.)
micronaut.application.name=cordato

# Path-based API versioning: every server-built route is served under a single global `/v1` prefix,
# applied here once via the server context-path — never as a `/v1` literal scattered across `@Controller`
# annotations, so the version stays a one-place config decision and controllers stay version-relative.
# (Static doc resources below — `/swagger`, `/swagger-ui` — describe the API rather than being part of it,
# so they stay at the root, unversioned.)
micronaut.server.context-path=/v1

# Every JSON property on the wire is snake_case, so the API contract reads `expires_at`, not
# `expiresAt`, while the Kotlin DTOs stay idiomatic camelCase. This is the single origin for that
# policy: micronaut-serde applies the strategy to every `@Serdeable` type, so no response DTO can
# drift or forget it, and every future field complies automatically. It governs serialization and
# deserialization alike; today every request field is a single word, so request bodies are unaffected.
micronaut.serde.property-naming-strategy=SNAKE_CASE

micronaut.router.static-resources.swagger.paths=classpath:META-INF/swagger
micronaut.router.static-resources.swagger.mapping=/swagger/**

micronaut.router.static-resources.swagger-ui.paths=classpath:META-INF/swagger/views/swagger-ui
micronaut.router.static-resources.swagger-ui.mapping=/swagger-ui/**
