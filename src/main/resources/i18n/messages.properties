# Default (pt-BR) HTTP response messages, resolved by stable key from the shared MessageSource
# (core). This is the single origin for every human-readable response text at the HTTP edge: adding
# a new language is only a matter of dropping a `messages_<locale>.properties` sibling here, with no
# code change. Only the readable TEXT lives here — the machine-readable error codes (INVALID_NAME,
# MALFORMED_REQUEST, ...) stay inline in the handlers/mapper as the API contract, never localized.
#
# Files are read as UTF-8 (Java 9+ PropertyResourceBundle default), so accented characters are
# written directly, no \\uXXXX escapes.

# --- Identity sign-up domain errors (SignUpErrorResponseMapper) ---
# Scalar 422 messages. `emailAlreadyInUse` stays deliberately generic (never confirms the e-mail is
# registered); `weakPassword` interpolates the public minimum length carried by the domain error.
signup.error.invalidName=O nome informado é inválido.
signup.error.invalidEmail=O e-mail informado é inválido.
signup.error.emailAlreadyInUse=Não foi possível concluir o cadastro.
signup.error.weakPassword=A senha deve ter ao menos {minLength} caracteres.

# --- Identity update-name domain error (UpdateNameErrorResponseMapper) ---
# Scalar 422 message for a name the domain rejects. The orphan-session PersonNotFound reuses
# error.authentication.message (the shared neutral 401), so it has no key of its own here.
updateName.error.invalidName=O nome informado é inválido.

# --- Identity update-email domain errors (UpdateEmailErrorResponseMapper) ---
# Scalar 422 messages. `emailAlreadyInUse` stays deliberately generic (never confirms the e-mail is
# registered nor echoes it), the same non-leak posture as signup, and shares the 422 status so the
# status line can't signal which rejection occurred. The InvalidCredentials/PersonNotFound cases reuse
# error.authentication.message (the shared neutral 401), so they have no key of their own here.
updateEmail.error.invalidEmail=O e-mail informado é inválido.
updateEmail.error.emailAlreadyInUse=Não foi possível atualizar o e-mail.

# --- Identity update-password domain errors (UpdatePasswordErrorResponseMapper) ---
# Scalar 422 messages for the two PUBLIC rejections — a weak new password (the minimum length reveals
# nothing about anyone) and a new password equal to the current one (the authenticated owner's own secret,
# so a specific message is no account-discovery oracle). Both share the 422 status so the status line can't
# signal which occurred. The InvalidCredentials/PersonNotFound cases reuse error.authentication.message
# (the shared neutral 401), so they have no key of their own here.
updatePassword.error.weakPassword=A senha deve ter ao menos {minLength} caracteres.
updatePassword.error.samePassword=A nova senha deve ser diferente da senha atual.

# --- Identity sign-in domain error (SignInErrorResponseMapper) ---
# Scalar 401 message. Deliberately generic: it never says which factor failed (wrong password,
# unknown e-mail, non-active person) so it cannot be used to probe which e-mails are registered.
# The code UNAUTHENTICATED stays inline in the mapper as the machine contract, never localized.
signin.error.invalidCredentials=E-mail ou senha inválidos.

# --- Edge Bean Validation (SignInRequest) ---
# Presence-only at the login edge (@NotBlank); no policy (size/pattern) so a legitimate password
# that predates a policy change is never rejected with a 400 before authentication is attempted.
signin.request.email.notBlank=O e-mail é obrigatório.
signin.request.password.notBlank=A senha é obrigatória.

# --- Edge Bean Validation (SignUpRequest) ---
# Referenced as `{key}` from the constraints' `message`; the interpolator resolves the key against
# this bundle and re-interpolates the nested constraint placeholders (`{max}`, `{min}`).
signup.request.name.notBlank=O nome é obrigatório.
signup.request.email.notBlank=O e-mail é obrigatório.
signup.request.email.pattern=O e-mail informado é inválido.
signup.request.name.maxSize=O nome deve ter no máximo {max} caracteres.
signup.request.password.minSize=A senha deve ter ao menos {min} caracteres.

# --- Edge Bean Validation (UpdateNameRequest) ---
# Same single origin: the `{key}` in each constraint's `message` resolves here, and the `{max}` bound
# is re-interpolated from NameValueObject.MAX_LENGTH referenced on the constraint.
updateName.request.name.notBlank=O nome é obrigatório.
updateName.request.name.maxSize=O nome deve ter no máximo {max} caracteres.

# --- Edge Bean Validation (UpdateEmailRequest) ---
# Same single origin: the `{key}` in each constraint's `message` resolves here. The email `@Pattern`
# bound references EmailValueObject.PATTERN on the constraint so the edge can't drift; the password is
# presence-only (@NotBlank) — no policy at the edge, since confirmation only checks the stored hash.
updateEmail.request.email.notBlank=O e-mail é obrigatório.
updateEmail.request.email.pattern=O e-mail informado é inválido.
updateEmail.request.password.notBlank=A senha é obrigatória.

# --- Edge Bean Validation (UpdatePasswordRequest) ---
# Same single origin: the `{key}` in each constraint's `message` resolves here. `currentPassword` is
# presence-only (@NotBlank) — no policy at the edge, since confirmation only checks the stored hash; the
# new password's `@Size(min)` bound references PasswordValueObject.MIN_LENGTH on the constraint so the edge
# can't drift, and `{min}` is re-interpolated from it.
updatePassword.request.currentPassword.notBlank=A senha atual é obrigatória.
updatePassword.request.newPassword.notBlank=A nova senha é obrigatória.
updatePassword.request.newPassword.minSize=A nova senha deve ter ao menos {min} caracteres.

# --- Cross-cutting HTTP error handlers (core) ---
# Summary/scalar messages for the shared error contract: edge validation 400, malformed-body 400,
# unexpected 500. The 500 text is generic on purpose — no internal detail is ever interpolated in.
error.validation.message=A requisição contém campos inválidos.
error.malformed.message=O corpo da requisição está ausente ou é inválido.
error.internal.message=Ocorreu um erro inesperado. Tente novamente mais tarde.

# --- Cross-cutting edge authentication guard (AuthenticationServerFilter) ---
# Scalar 401 message. Deliberately generic: it never says which precondition failed (token absent,
# expired or revoked), the same non-leak posture as sign-in. The code UNAUTHENTICATED stays inline in
# the filter as the machine contract, never localized.
error.authentication.message=Autenticação necessária.
