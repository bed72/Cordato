# Default (pt-BR) HTTP response messages, resolved by stable key from the shared MessageSource
# (core). This is the single origin for every human-readable response text at the HTTP edge: adding
# a new language is only a matter of dropping a `messages_<locale>.properties` sibling here, with no
# code change. Only the readable TEXT lives here — the machine-readable error codes (INVALID_NAME,
# MALFORMED_REQUEST, ...) stay inline in the handlers/mapper as the API contract, never localized.
#
# Files are read as UTF-8 (Java 9+ PropertyResourceBundle default), so accented characters are
# written directly, no \\uXXXX escapes.

# --- Identity sign-up domain errors (SignUpErrorResponseMapper) ---
# Scalar 422 messages. `emailAlreadyInUse` stays deliberately generic (never confirms the e-mail is
# registered); `weakPassword` interpolates the public minimum length carried by the domain error.
signup.error.invalidName=O nome informado é inválido.
signup.error.invalidEmail=O e-mail informado é inválido.
signup.error.emailAlreadyInUse=Não foi possível concluir o cadastro.
signup.error.weakPassword=A senha deve ter ao menos {minLength} caracteres.

# --- Edge Bean Validation (SignUpRequest) ---
# Referenced as `{key}` from the constraints' `message`; the interpolator resolves the key against
# this bundle and re-interpolates the nested constraint placeholders (`{max}`, `{min}`).
signup.request.name.notBlank=O nome é obrigatório.
signup.request.email.notBlank=O e-mail é obrigatório.
signup.request.email.pattern=O e-mail informado é inválido.
signup.request.name.maxSize=O nome deve ter no máximo {max} caracteres.
signup.request.password.minSize=A senha deve ter ao menos {min} caracteres.

# --- Cross-cutting HTTP error handlers (core) ---
# Summary/scalar messages for the shared error contract: edge validation 400, malformed-body 400,
# unexpected 500. The 500 text is generic on purpose — no internal detail is ever interpolated in.
error.validation.message=A requisição contém campos inválidos.
error.malformed.message=O corpo da requisição está ausente ou é inválido.
error.internal.message=Ocorreu um erro inesperado. Tente novamente mais tarde.
