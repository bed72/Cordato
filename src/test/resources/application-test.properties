# Micronaut Test auto-activates the "test" environment for every @MicronautTest, layering this file on
# top of the main application.properties. Rate-limit overrides only: the full @MicronautTest suite shares
# one cached application context (and its singleton FakeCachePort) across many test classes, so the same
# "client" (localhost) racks up far more requests within a window than production-tuned limits allow —
# AuthenticationControllerTest alone issues 20+ sign-up/sign-in calls, well past the sensitive tier's 5/min
# default. These generous overrides keep rate limiting a no-op for the rest of the suite; RateLimitFilterTest
# itself overrides these again, per-test, via @Property to exercise the real 429 path deterministically.
cordato.rate-limit.general.limit=100000
cordato.rate-limit.general.window=PT1M
cordato.rate-limit.sensitive.limit=100000
cordato.rate-limit.sensitive.window=PT1M
