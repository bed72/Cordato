# Local PostgreSQL for development. Tests spin up their own throwaway PostgreSQL via
# Testcontainers, so this service is only for running the app locally.
#
# Credentials come from a git-ignored `.env` file — copy `.env.example` to `.env`
# (or run `make db-up`, which creates it for you). Never commit `.env`.
#
#   make db-up     # start in the background
#   make db-down   # stop (data is kept in the named volume)

services:
  postgres:
    image: postgres:18-alpine
    container_name: cordato-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      # postgres:18+ stores data in a version-specific subdirectory and expects the volume
      # mounted at /var/lib/postgresql (not .../data), so it refuses the old .../data mount.
      - cordato-pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  cordato-pgdata:
