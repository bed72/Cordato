# Local PostgreSQL + Valkey for development. Tests spin up their own throwaway containers via
# Testcontainers, so these services are only for running the app locally.
#
# Credentials come from a git-ignored `.env` file — copy `.env.example` to `.env`
# (or run `make db-up`/`make valkey-up`, which create it for you). Never commit `.env`.
#
#   make db-up       # start PostgreSQL in the background
#   make db-down     # stop (data is kept in the named volume)
#   make valkey-up   # start Valkey in the background
#   make valkey-down # stop (data is kept in the named volume)

services:
  postgres:
    image: postgres:18-alpine
    container_name: cordato-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      # postgres:18+ stores data in a version-specific subdirectory and expects the volume
      # mounted at /var/lib/postgresql (not .../data), so it refuses the old .../data mount.
      - cordato-pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    container_name: cordato-valkey
    restart: unless-stopped
    ports:
      - "${VALKEY_PORT}:6379"
    volumes:
      - cordato-valkeydata:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  cordato-pgdata:
  cordato-valkeydata:
